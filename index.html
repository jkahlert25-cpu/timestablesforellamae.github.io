<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Times Tables Learner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="home-screen" class="screen active">
    <div class="home-wrap">

      <header class="home-header">
        <h1 class="site-title">Times Tables Learner</h1>
      </header>

      <section class="selection-section">
        <h2 class="section-label">Choose your times tables:</h2>
        <div
          class="table-grid"
          id="table-grid"
          role="group"
          aria-label="Times tables to practise"
        ></div>
        <div class="bulk-btns">
          <button class="btn btn-ghost" id="select-all-btn">Select All</button>
          <button class="btn btn-ghost" id="clear-all-btn">Clear All</button>
        </div>
        <p class="warning-msg" id="warning-msg" role="alert" aria-live="polite" hidden>
          Please select at least one times table first.
        </p>
      </section>

      <div class="start-wrap">
        <button class="btn btn-primary btn-xl" id="start-btn">Let's Go!</button>
        <button class="btn btn-primary btn-xl" id="quiz-btn">Quiz</button>
      </div>

    </div>
  </div>

  <div id="quiz-screen" class="screen">
    <div class="practice-wrap">

      <div class="top-bar">
        <div class="score-box" aria-label="Timer">
          <span class="score-label">Time</span>
          <span class="score-nums" id="quiz-timer">30</span>
        </div>
        <div class="score-box" aria-label="Question progress">
          <span class="score-label">Question</span>
          <span class="score-nums">
            <span id="quiz-q-current">1</span>
            <span class="score-sep">/</span>
            <span>12</span>
          </span>
        </div>
        <button class="btn btn-quit" id="quiz-quit-btn">Quit</button>
      </div>

      <div class="question-card" id="quiz-question-card">
        <p class="q-prompt">What is…</p>
        <p class="q-text" id="quiz-question-text">? × ? = ?</p>
      </div>

      <div class="answer-area">
        <label for="quiz-answer-input" class="visually-hidden">Your answer</label>
        <input
          type="number"
          id="quiz-answer-input"
          class="answer-input"
          placeholder="Type your answer…"
          min="0"
          max="9999"
          inputmode="numeric"
          autocomplete="off"
          aria-describedby="quiz-feedback-msg"
        />
        <button class="btn btn-submit" id="quiz-submit-btn">Check</button>
      </div>

      <div class="feedback-msg" id="quiz-feedback-msg" role="alert" aria-live="assertive"></div>

    </div>
  </div>

  <div id="practice-screen" class="screen">
    <div class="practice-wrap">

      <div class="top-bar">
        <div class="score-box" aria-label="Your score">
          <span class="score-label">Score</span>
          <span class="score-nums">
            <span id="score-correct" class="score-correct">0</span>
            <span class="score-sep">/</span>
            <span id="score-total" class="score-total">0</span>
          </span>
        </div>
        <div class="streak-box" id="streak-box" aria-label="Current streak">
          <span id="streak-count" class="streak-count">0</span>
          <span class="streak-label">streak</span>
        </div>
        <button class="btn btn-quit" id="quit-btn">Quit</button>
      </div>

      <div class="chips-row" id="chips-row" aria-label="Practising tables:"></div>

      <div class="question-card" id="question-card">
        <p class="q-prompt">What is…</p>
        <p class="q-text" id="question-text">? × ? = ?</p>
      </div>

      <div class="answer-area">
        <label for="answer-input" class="visually-hidden">Your answer</label>
        <input
          type="number"
          id="answer-input"
          class="answer-input"
          placeholder="Type your answer…"
          min="0"
          max="9999"
          inputmode="numeric"
          autocomplete="off"
          aria-describedby="feedback-msg"
        />
        <button class="btn btn-submit" id="submit-btn">Check</button>
      </div>

      <div class="feedback-msg" id="feedback-msg" role="alert" aria-live="assertive"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
