<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================================
    SITE TITLE  ← Change this text to rename the browser tab
  ============================================================ -->
  <title>Times Tables Learner</title>

  <!-- Google Fonts: Baloo 2 (headings) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
    HOME / SETUP SCREEN
    The first screen the user sees — pick tables, then start.
  ============================================================ -->
  <div id="home-screen" class="screen active">

    <!-- Floating decorative shapes (CSS-only, no emoji) -->
    <div class="deco" aria-hidden="true">
      <span class="deco-star s1"></span>
      <span class="deco-star s2"></span>
      <span class="deco-star s3"></span>
      <span class="deco-star s4"></span>
      <span class="deco-star s5"></span>
    </div>

    <div class="home-wrap">

      <!-- HEADER -->
      <header class="home-header">

        <!-- ============================================================
          MAIN HEADING  ← Change this to rename the app
        ============================================================ -->
        <h1 class="site-title">Times Tables Learner</h1>

      </header>

      <!-- TIMES TABLE SELECTION GRID
           The 12 toggle cards are generated by script.js -->
      <section class="selection-section">
        <h2 class="section-label">Choose your times tables:</h2>

        <div
          class="table-grid"
          id="table-grid"
          role="group"
          aria-label="Times tables to practise"
        ></div>

        <!-- Select All / Clear All -->
        <div class="bulk-btns">
          <button class="btn btn-ghost" id="select-all-btn">Select All</button>
          <button class="btn btn-ghost" id="clear-all-btn">Clear All</button>
        </div>

        <!-- Warning: shown only when user hits Start with nothing selected -->
        <p class="warning-msg" id="warning-msg" role="alert" aria-live="polite" hidden>
          Please select at least one times table first.
        </p>
      </section>

      <!-- START BUTTON -->
      <div class="start-wrap">
        <button class="btn btn-primary btn-xl" id="start-btn">
          Let's Go!
        </button>
      </div>

    </div><!-- /home-wrap -->
  </div><!-- /home-screen -->


  <!-- ============================================================
    PRACTICE SCREEN
    Hidden on load. script.js shows it when the session starts.
  ============================================================ -->
  <div id="practice-screen" class="screen">

    <div class="practice-wrap">

      <!-- TOP BAR: score, streak, quit -->
      <div class="top-bar">

        <div class="score-box" aria-label="Your score">
          <span class="score-label">Score</span>
          <span class="score-nums">
            <span id="score-correct" class="score-correct">0</span>
            <span class="score-sep">/</span>
            <span id="score-total" class="score-total">0</span>
          </span>
        </div>

        <div class="streak-box" id="streak-box" aria-label="Current streak">
          <span id="streak-count" class="streak-count">0</span>
          <span class="streak-label">streak</span>
        </div>

        <button class="btn btn-quit" id="quit-btn">Quit</button>
      </div>

      <!-- Small chips showing which tables are active -->
      <div class="chips-row" id="chips-row" aria-label="Practising tables:"></div>

      <!-- QUESTION CARD -->
      <div class="question-card" id="question-card">
        <p class="q-prompt">What is…</p>
        <p class="q-text" id="question-text">? × ? = ?</p>
      </div>

      <!-- ANSWER AREA -->
      <div class="answer-area">
        <label for="answer-input" class="visually-hidden">Your answer</label>
        <input
          type="number"
          id="answer-input"
          class="answer-input"
          placeholder="Type your answer…"
          min="0"
          max="9999"
          inputmode="numeric"
          autocomplete="off"
          aria-describedby="feedback-msg"
        />
        <button class="btn btn-submit" id="submit-btn">Check</button>
      </div>

      <!-- FEEDBACK (correct / wrong) -->
      <div class="feedback-msg" id="feedback-msg" role="alert" aria-live="assertive"></div>

      <!-- NEXT QUESTION (shown after user answers) -->
      <button class="btn btn-next" id="next-btn" hidden>
        Next Question →
      </button>

    </div><!-- /practice-wrap -->

    <!-- Confetti container — JS drops coloured dots here on correct answers -->
    <div class="confetti-wrap" id="confetti-wrap" aria-hidden="true"></div>

  </div><!-- /practice-screen -->

  <script src="script.js"></script>
</body>
</html>
